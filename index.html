<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillSplitter</title>
    <!--
      Runs synchronously before any CSS or paint.
      Applies the correct dark/light class to <html> immediately so there is
      zero flash of wrong theme on load, even with SSR or slow JS bundles.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark = stored === 'dark'
            || (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (_) {
          // If localStorage is blocked (e.g. private browsing restrictions), do nothing.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
