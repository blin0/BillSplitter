    <!--
      Runs synchronously before any CSS or paint.
      Applies the correct dark/light class to <html> immediately so there is
      zero flash of wrong theme on load, even with SSR or slow JS bundles.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark = stored === 'dark'
            || (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (_) {
          // If localStorage is blocked (e.g. private browsing restrictions), do nothing.
        }
      })();
    </script>
